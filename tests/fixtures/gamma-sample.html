<!DOCTYPE html>

<section id="card-0">
  <h1>看似花费，实则积累</h1>
  <p>这一年，支付宝账单显示总支出超过十六万元。</p>
  <p><b>旁白：</b>看似一年花了十六万，实则被动收益悄悄还回来了九成。资金的表面流动掩盖了深层的财富积累机制。</p>
</section>
<section id="card-1">
  <h1>收支结构全貌</h1>
  <p>总收入三十万，总支出十六万，净流出六万。</p>
  <p><b>旁白：</b>看似储蓄率超过四成，实则业务收支混入个人账户，真实个人储蓄率只有两成七。分离账户是财务清晰的第一步。</p>
</section>
<section id="card-2">
  <h1>月度趋势与异常</h1>
  <p>全年消费均值一万三，标准差四千，春节月份异常升高。</p>
  <p><b>旁白：</b>月度支出看似平稳，实则隐藏三个异常月份。每一个消费峰值背后，都是一次可识别的生活事件。</p>
</section>
